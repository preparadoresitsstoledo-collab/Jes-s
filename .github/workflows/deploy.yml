name: Desplegar en GitHub Pages

on:
  push:
    branches: [main, claude/eager-fermi-qnvsoc]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Construye la aplicación (web + analizador de convenios) y la publica en
# GitHub Pages. La app queda accesible en la URL de Pages del repositorio y el
# analizador en .../#/analizador
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto (build)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
